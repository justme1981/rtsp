name: Build MIPS call_rtsp

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install cross-compiler
      run: sudo apt-get update && sudo apt-get install -y gcc-mipsel-linux-gnu

    - name: Compile call_rtsp
      run: mipsel-linux-gnu-gcc call_rtsp.c -o call_rtsp -ldl

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: call_rtsp_mips
        path: call_rtsp
